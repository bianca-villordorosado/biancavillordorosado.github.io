<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
  button {
    color: #EE1166;
    font-weight: bold;  }
  div {
    padding: 10px;
  }
  body {
    display: flex;
    flex-direction: column;
    width: fit-content;
    border: solid 5px #00cdba;
    padding: 10px;
    font-size: 18px;
  }
  fieldset {
    border: solid 2px #33CCBA;
  }
</style>
<body>
  <div>
    <label for="custom-name">Enter custom name:</label>
    <input id="custom-name" type="text" placeholder="" />
  </div>
  <fieldset>
    <legend>Choose locale:</legend>
    <label for="us">US</label>
      <input id="us" type="radio" name="uk-us" value="us" checked />
    <label for="uk">UK</label>
      <input id="uk" type="radio" name="uk-us" value="uk" />
  </fieldset>
  <div>
    <button class="generate">Generate random story</button>
  </div>
<!-- Thanks a lot to Willy Aguirre for his help with the code for this assessment -->
  <p class="story"></p>

<script>
  // Complete variable definitions and random functions

const customName = document.getElementById("custom-name");
const generateBtn = document.querySelector(".generate");
const story = document.querySelector(".story");

function randomValueFromArray(array) {
  const random = Math.floor(Math.random() * array.length);
  return array[random];
}

// Raw text strings, done

const characters = ["Hatsune Miku", "Meiko", "Kaito", "Kagamine Len", "Kagamine Rin", "Megurine Luka"];
const places = ["scramble crossing", "the crase cafe", "vivid street"];
const events = ["performed a street performance", "got some pancakes", "tripped"];

// Partial return random string function, done

function returnRandomStoryString() {
  
  const randomCharacter = randomValueFromArray(characters);
  const randomPlace = randomValueFromArray(places);
  const randomEvent = randomValueFromArray(events);

  let storyText =  `It was 94 Fahrenheit outside, which was perfect for ${randomCharacter}. They headed to ${randomPlace} where they ${randomEvent}. Luckily, ${randomCharacter}'s number one fan, Count Pearl got to witness this rare occurence! Later, Count Pearl recounted the experience in their journal with the fun fact that ${randomCharacter} weighs 115 pounds, and noted how it was a hot day.`;

  return storyText;
}

// Event listener and partial generate function definition, done

generateBtn.addEventListener("click", generateStory);

function generateStory() {
  let newStory = returnRandomStoryString();

  if (customName.value !== "") {
    const name = customName.value;
    newStory = newStory.replace("Count Pearl", name);
    newStory = newStory.replace("Count Pearl", name);
  }

  if (document.getElementById("uk").checked) {
    const weight = Math.round(300/14) + " stone";
    const temperature = Math.round((94-32) * (5/9)) + " Celsius";

    newStory = newStory.replace("300 pounds", weight);
    newStory = newStory.replace("94 Fahrenheit", temperature);
  }

  // TODO: replace "" with the correct expression, done
  story.textContent = newStory;
  story.style.visibility = "visible";

}
</script>

</body>
</html>
